<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fallout 4 Achievements</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
    <style>
        body {
            padding: 2rem;
        }

        h1 {
            text-align: center;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            text-align: center;
            color: var(--pico-muted-color);
            margin-bottom: 2rem;
        }

        .achievement-list {
            display: grid;
            gap: 0.75rem;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .achievement-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            border: 1px solid var(--pico-muted-border-color);
            border-radius: var(--pico-border-radius);
            background: var(--pico-card-background-color);
            cursor: pointer;
            transition: background 0.15s;
        }

        .achievement-item:hover {
            background: var(--pico-card-sectioning-background-color);
        }

        .achievement-item.completed {
            opacity: 0.5;
        }

        .achievement-item img {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .achievement-info {
            flex: 1;
            min-width: 0;
        }

        .achievement-info strong {
            display: block;
            font-size: 1rem;
            margin-bottom: 0.15rem;
        }

        .achievement-info small {
            color: var(--pico-muted-color);
            font-size: 0.85rem;
        }

        .achievement-item input[type="checkbox"] {
            flex-shrink: 0;
            margin: 0;
            width: 1.25rem;
            height: 1.25rem;
            cursor: pointer;
        }

        .progress-bar-wrap {
            margin-bottom: 2rem;
        }

        progress {
            width: 100%;
            margin-bottom: 0.25rem;
        }

        .progress-label {
            text-align: center;
            font-size: 0.9rem;
            color: var(--pico-muted-color);
        }

        .controls {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 1rem;
        }

        .controls input[type="search"] {
            flex: 1;
            margin: 0;
        }
    </style>
</head>

<body>
    <main class="container">
        <h1>⚡ Fallout 4 Achievements</h1>
        <p class="subtitle">Track your progress across the Commonwealth</p>

        <div class="progress-bar-wrap">
            <progress id="progress" max="84" value="0"></progress>
            <p class="progress-label" id="progress-label">0 / 84 completed</p>
        </div>

        <div class="controls">
            <input type="search" id="search" placeholder="Search achievements…" aria-label="Search achievements" />
            <button class="secondary outline" id="btn-clear">Clear all</button>
            <button class="primary outline" id="btn-check-all">Check all</button>
        </div>

        <ul class="achievement-list" id="achievement-list"></ul>
    </main>

    <script>

{ "name": "RobCo's Worst Nightmare", "description": "Hack 50 terminals", "image": "images/robcosWorstNightmare.jpg" }, { "name": "Robot Hunter", "description": "Unlock 10 robot mods", "image": "images/robotHunter.jpg" }, { "name": "Rockets' Red Glare", "description": "Complete Rockets' Red Glare", "image": "images/rocketsRedGlare.jpg" }, { "name": "Sanctuary", "description": "Complete Sanctuary", "image": "images/sanctuary.jpg" }, { "name": "Scavver", "description": "Gather 1000 resources used for crafting", "image": "images/scavver.jpg" }, { "name": "Semper Invicta", "description": "Complete Semper Invicta", "image": "images/semperInvicta.jpg" }, { "name": "Show Off", "description": "Display a weapon on a weapon rack, armor on an armor rack, and power armor in a power armor display", "image": "images/showOff.jpg" }, { "name": "Taken for a Ride", "description": "Complete Taken for a Ride", "image": "images/takenForARide.jpg" }, { "name": "Taking Independence", "description": "Complete Taking Independence", "image": "images/takingIndependence.jpg" }, { "name": "The First Step", "description": "Complete The First Step", "image": "images/theFirstStep.jpg" }, { "name": "The Grand Tour", "description": "Complete The Grand Tour", "image": "images/theGrandTour.jpg" }, { "name": "...The Harder They Fall", "description": "Kill 5 giant creatures", "image": "images/theHarderTheyFall.jpg" }, { "name": "The Islander's Almanac", "description": "Collect all issues of \"The Islander's Almanac\" magazine", "image": "images/theIslandersAlmanac.jpg" }, { "name": "The Molecular Level", "description": "Complete The Molecular Level", "image": "images/theMolecularLevel.jpg" }, { "name": "The Most Toys", "description": "Build 10 robot mods", "image": "images/theMostToys.jpg" }, { "name": "The Nuclear Option", "description": "Complete The Nuclear Option", "image": "images/theNuclearOption.jpg" }, { "name": "The Way Life Should Be", "description": "Complete The Way Life Should Be", "image": "images/theWayLifeShouldBe.jpg" }, { "name": "...They're Action Figures", "description": "Collect 20 Vault-Tec Bobbleheads", "image": "images/theyreActionFigures.jpg" }, { "name": "They're Not Dolls...", "description": "Collect 10 Vault-Tec Bobbleheads", "image": "images/theyreNotDolls.jpg" }, { "name": "Time Out", "description": "Assign a settler to a pillory", "image": "images/timeOut.jpg" }, { "name": "Touchdown!", "description": "Score a touchdown", "image": "images/touchdown.jpg" }, { "name": "Tradecraft", "description": "Complete Tradecraft", "image": "images/tradecraft.jpg" }, { "name": "Trapper", "description": "Build one of every cage type", "image": "images/trapper.jpg" }, { "name": "Underground Undercover", "description": "Complete Underground Undercover", "image": "images/undergroundUndercover.jpg" }, { "name": "Unlikely Valentine", "description": "Complete Unlikely Valentine", "image": "images/unlikelyValentine.jpg" }, { "name": "Unstoppable Wanderer", "description": "Reach Level 25", "image": "images/unstoppableWanderer.jpg" }, { "name": "Vault Dweller", "description": "Equip Vault 88 suit and Pip-Boy on a settler", "image": "images/vaultDweller.jpg" }, { "name": "War Never Changes", "description": "Enter the wasteland", "image": "images/warNeverChanges.jpg" }, { "name": "Wasteland D.I.Y.", "description": "Craft 100 items", "image": "images/wastelandDiy.jpg" }, { "name": "What's Yours Is Mine", "description": "Pick 50 locks", "image": "images/whatsYoursIsMine.jpg" }, { "name": "When Freedom Calls", "description": "Complete When Freedom Calls", "image": "images/whenFreedomCalls.jpg" }, { "name": "Where You Belong", "description": "Complete Where You Belong", "image": "images/whereYouBelong.jpg" }];
        }

        function getChecked() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
            } catch {
                return {};
            }
        }

        function saveChecked(checked) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(checked));
        }

        function updateProgress(checked, total) {
            const count = Object.values(checked).filter(Boolean).length;
            document.getElementById('progress').value = count;
            document.getElementById('progress-label').textContent = `${count} / ${total} completed`;
        }

        function getFilter() {
            return document.getElementById('search').value.trim().toLowerCase();
        }

        function render(achievements, checked) {
            const list = document.getElementById('achievement-list');
            list.innerHTML = '';
            const filter = getFilter();

            const indexed = achievements.map((a, i) => ({ a, id: `ach-${i}` }));
            const visible = filter
                ? indexed.filter(({ a }) => a.name.toLowerCase().includes(filter))
                : indexed;

            const unchecked = visible.filter(({ id }) => !checked[id]);
            const done = visible.filter(({ id }) => checked[id]);

            [...unchecked, ...done].forEach(({ a, id }) => {
                const isDone = !!checked[id];

                const li = document.createElement('li');
                li.className = 'achievement-item' + (isDone ? ' completed' : '');
                li.innerHTML = `
          <img src="${a.image}" alt="${a.name}" loading="lazy" />
          <div class="achievement-info">
            <strong>${a.name}</strong>
            <small>${a.description}</small>
          </div>
          <input type="checkbox" id="${id}" ${isDone ? 'checked' : ''} aria-label="Mark ${a.name} as completed" />
        `;

                li.querySelector('input[type="checkbox"]').addEventListener('change', (e) => {
                    checked[id] = e.target.checked;
                    saveChecked(checked);
                    updateProgress(checked, achievements.length);
                    render(achievements, checked);
                });

                list.appendChild(li);
            });
        }

        function init() {
            const achievements = loadAchievements();
            const checked = getChecked();

            render(achievements, checked);
            updateProgress(checked, achievements.length);

            document.getElementById('btn-check-all').addEventListener('click', () => {
                achievements.forEach((_, i) => checked[`ach-${i}`] = true);
                saveChecked(checked);
                render(achievements, checked);
                updateProgress(checked, achievements.length);
            });

            document.getElementById('btn-clear').addEventListener('click', () => {
                achievements.forEach((_, i) => delete checked[`ach-${i}`]);
                saveChecked(checked);
                render(achievements, checked);
                updateProgress(checked, achievements.length);
            });

            document.getElementById('search').addEventListener('input', () => {
                render(achievements, checked);
            });
        }

        init();
    </script>
</body>

</html>
